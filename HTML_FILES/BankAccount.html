<!DOCTYPE html>
<html lang="en">
<head>
    <title>Check Bank Account</title>
    <script src="../JS_FILE/javaScript.js"></script>
</head>
<body>
    <fieldset style="width: 300px;">
        <legend style="color: blue; font-weight: bold;font-family: sans-serif;"> Bank Deposit & Withdrawal System</legend>
        <p>Account Balance starts at 400,000</p>
        <input type="number" id="depositInput" placeholder="Enter Amount to Deposit">
        <button onclick="depositMoney()">Deposit Money</button> <br><br>
        <input type="number" id="withdrawInput" placeholder="Enter Amount to Withdraw">
        <button onclick="withdrawMoney()">Withdraw Money</button>
        <p id="bankResult"></p>
    </fieldset>
</body>
</html>
